  # ═══════════════════════════════════════════
  # LOCAL MODELS (in the user's catalog — archetype examples)
  # ═══════════════════════════════════════════

  # Local models are registered per-user via `serve register`.
  # The archetypes below define what kind of model fits each VRAM tier.
  # The serve recommend command scans the user's catalog and picks the best match.

archetypes:
  main:
    heavy:
      name: "27-28B dense (Q4)"
      size_gb: 14-17
      vram_gb: 22
      ctx_max: 1048576
      tier: s
      examples: ["Darwin 28B Reason", "Qwen 3.6-27B fine-tunes", "Llama 3.3 27B"]
    medium:
      name: "27B hybrid/Mamba (Q4)"
      size_gb: 14
      vram_gb: 16
      ctx_max: 262144
      tier: s
      examples: ["Prism Eagle 27B", "Mamba2+GDN hybrids"]
    moe:
      name: "32-35B MoE 3B-active (Q4)"
      size_gb: 11-18
      vram_gb: 11-17
      ctx_max: 1048576
      tier: sf
      examples: ["Carnice 35A3B", "Darwin Apex", "Qwen 4 32B-A3B"]
    light:
      name: "27B dense + MTP (Q4)"
      size_gb: 17
      vram_gb: 22
      ctx_max: 262144
      tier: sf
      examples: ["Carwin 28B MTP", "Qwopus 27B v2 MTP"]
    budget:
      name: "27B dense base (Q4)"
      size_gb: 16-17
      vram_gb: 22
      ctx_max: 262144
      tier: c
      examples: ["Qwable 27B base", "Qwen 3.6-27B base"]

  aux:
    primary:
      name: "35B MoE 3B-active (Q4)"
      size_gb: 11
      vram_gb: 17
      ctx_max: 1048576
      tier: sf
      examples: ["Carnice 35A3B Apex"]
    cpu_moe:
      name: "35B MoE with cpu-moe"
      size_gb: 11
      vram_gb: 11
      ctx_max: 1048576
      tier: sf
      notes: "MoE experts offloaded to CPU RAM"
    small:
      name: "Small multimodal (≤3B)"
      size_gb: 2-3
      vram_gb: 3
      ctx_max: 32768
      tier: c
      examples: ["Qwen2.5-Omni-3B"]

