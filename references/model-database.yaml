# Turbofit Model Database — Dynamic Source of Truth
# Last updated: 2026-06-25
# This file is auto-updated by the daily research cron and synced to GitHub.
# All turbofit skill references read from this file instead of hardcoded tables.
#
# Schema:
#   models:
#     <slug>:
#       name: Human-readable name
#       family: Model family (Qwen, GLM, DeepSeek, Mimo, MiniMax, Kimi, Llama, Grok, Phi, Gemma, etc.)
#       version: Version string
#       type: api | local | both
#       vision: true | false
#       role: main | aux | either
#       context_max: Maximum context in tokens
#       context_tiers: [list of supported context tiers]
#       pricing:
#         nous: { input: $/M, output: $/M, slug: "nous-model-slug" }  # Through Nous gateway
#         openrouter: { input: $/M, output: $/M, slug: "or-model-slug", free: false }
#         nim: { input: 0, output: 0, slug: "nim-model-slug" }  # NVIDIA NIM free
#         direct: { input: $/M, output: $/M, provider: "Z.AI" | "DeepSeek" | "DashScope" | "Xiaomi" | "Moonshot" }
#       benchmarks:
#         mmlu: score
#         humaneval: score
#         swe_verified: score
#         aime: score
#         math: score
#         source: "URL or source name"
#       local:
#         gguf_repo: "HF repo for GGUF downloads"
#         gguf_quants: ["Q4_K_M", "Q8_0", "BF16"]
#         size_gb: disk footprint at Q4_K_M
#         archetypes: ["27-28B dense", "35B MoE 3B-active", etc.]
#         mmproj: mmproj file name
#         n_embd: embedding dimension (for mmproj matching)
#       notes: "Any special notes"
#       discovered: "2026-06-25"  # Date added to database
#       last_verified: "2026-06-25"  # Last time pricing/benchmarks were verified

