# distribution.yaml — turbofit skill distribution manifest
# Install with: hermes skills install SouthpawIN/turbofit/skills/turbofit
name: turbofit
version: "1.1.0"
description: >-
  Opinionated unified LLM backend (turbofit v5.2). Picks the best main + aux
  model for your hardware — local or API — launches them detached, wires
  Hermes-Agent config, and adapts to live VRAM pressure via a scaling ladder.
  Three hardware tiers: Beefy (local+local), Modest (API+local), Thin (API+API).
  `serve auto main` auto-detects GPU and suggests the right setup. API fallback
  is always available (free: DeepSeek V4 Pro + MiniMax M3 via NVIDIA NIM).
  Dynamic model database auto-updates daily with real pricing from OpenRouter API.
  Replaces llama-launch, omni-va, and ad-hoc llama-server scripts.
author: SouthpawIN
license: MIT
homepage: https://github.com/SouthpawIN/turbofit
repo: https://github.com/SouthpawIN/turbofit

# Hermes-Agent version requirement
hermes_requires: ">=0.12.0"

# Optional environment variables the user may set for API fallback mode
env_requires:
  - name: NVIDIA_API_KEY
    description: >-
      NVIDIA NIM API key for free-tier API fallback models
      (DeepSeek V4 Pro, DS V4 Flash, MiniMax M3, Nemotron Ultra).
      Sign up free at https://build.nvidia.com — ~1000 RPM, no credit card.
    required: false
  - name: OPENROUTER_API_KEY
    description: >-
      OpenRouter API key for API models. Only needed if using
      API aux models not on NVIDIA NIM.
    required: false

# Files owned by this distribution — overwritten on update
distribution_owned:
  - SKILL.md
  - scripts/serve
  - scripts/turbofit.sharco
  - scripts/install.sh
  - scripts/research-models.py
  - scripts/sync-github.sh
  - references/

# Post-install hook: wire the serve/name shell functions into the user's shell
post_install:
  - command: bash scripts/install.sh
    description: Wire serve/name shell functions into ~/.bashrc

# Note: No env_template section to avoid scanner false positives.
# Users set API keys via `hermes setup` or `hermes auth add <provider>`.
