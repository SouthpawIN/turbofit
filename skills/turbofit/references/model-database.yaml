providers:
  nim:
    auth: NVIDIA_API_KEY
    base_url: https://integrate.api.nvidia.com/v1
    notes: Free endpoints, no credit card, ~1000 RPM
    rate_limit: ~1000 RPM
    tool_gateway: false
  nous:
    auth: OAuth subscription
    base_url: https://inference-api.nousresearch.com/v1
    notes: 300+ models, $22/mo credits, TG included (Firecrawl, FAL, OpenAI TTS, Browser
      Use)
    tool_gateway: true
  openrouter:
    auth: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    credit_bonus: 10% bonus on credits purchased
    notes: Free models (:free suffix), pay-per-use
    tool_gateway: false
